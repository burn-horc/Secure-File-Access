<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Branding -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=10" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png?v=10" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=1" />
    <link rel="manifest" href="/manifest.json" />

    <meta name="theme-color" content="#0d0f18" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Burn Horc" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css"
    />

    <title>Burn • Horc</title>

    <style>
      :root {
        --bg-dark: #050509;
        --bg-mid: #0d0f1a;
        --accent: #7c3aed;
        --accent-alt: #b91c1c;
        --accent-glow: rgba(124, 58, 237, 0.35);
        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        background: #050509;
      }

      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(circle at top, #111827 0%, var(--bg-dark) 60%);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, var(--accent-glow), transparent 70%);
        filter: blur(120px);
        opacity: 0.5;
        pointer-events: none;
        z-index: -1;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.04;
        pointer-events: none;
        z-index: -1;
      }

      #root {
        min-height: 100vh;
      }

      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        background: radial-gradient(circle at top, #111827 0%, #050509 60%);
        z-index: 9999;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }

      #app-loader.loader-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .loader-logo {
        font-size: 64px;
        font-weight: 900;
        color: #e50914;
        line-height: 1;
        letter-spacing: -2px;
        animation: loaderPulse 1.1s ease-in-out infinite;
      }

      .loader-bar {
        width: 140px;
        height: 6px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .loader-bar-fill {
        width: 45%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #7c3aed, #e50914);
        animation: loaderSlide 1s ease-in-out infinite;
      }

      @keyframes loaderPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.9;
        }
        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      @keyframes loaderSlide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>

  <body>
    <div id="app-loader">
      <div class="loader-logo">N</div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
