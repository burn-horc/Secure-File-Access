<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Branding -->
    <!-- Use your actual file: /public/N.png -->
    <link rel="icon" type="image/png" href="/N.png?v=2" />
    <link rel="shortcut icon" href="/N.png?v=2" />
    <link rel="apple-touch-icon" href="/N.png?v=2" />

    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css"
    />

    <!-- Tab Title -->
    <title>Burn • Horc</title>

    <style>
      :root {
        --bg-dark: #050509;
        --bg-mid: #0d0f1a;

        --accent: #7c3aed;
        --accent-alt: #b91c1c;
        --accent-glow: rgba(124, 58, 237, 0.35);

        --text-main: #e5e7eb;
        --text-muted: #9ca3af;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: radial-gradient(circle at top, #111827 0%, var(--bg-dark) 60%);
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, var(--accent-glow), transparent 70%);
        filter: blur(120px);
        opacity: 0.5;
        pointer-events: none;
        z-index: -1;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.04;
        pointer-events: none;
        z-index: -1;
      }

      #root {
        min-height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
